name: Java CI with Maven

on:
  push:
    branches: [ "master", "teste" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build (skip tests)
        working-directory: veiculos-srv
        run: |
          chmod +x mvnw
          ./mvnw -B -DskipTests package

  tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Tests (verify)
        working-directory: veiculos-srv
        run: |
          chmod +x mvnw
          ./mvnw -B verify
