name: Java CI with Maven

on:
  push:
    branches: [ "master", "teste" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build (skip tests)
        working-directory: veiculos-srv
        run: |
          chmod +x mvnw
          ./mvnw -B -DskipTests package

  tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Tests (verify)
        working-directory: veiculos-srv
        run: |
          chmod +x mvnw
          ./mvnw -B verify

      - name: Coverage guard (fail if decreased)
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail

          PR_XML="veiculos-srv/target/site/jacoco/jacoco.xml"
          if [[ ! -f "$PR_XML" ]]; then
            echo "JaCoCo report not found at: $PR_XML"
            exit 2
          fi

          export PR_COV
          PR_COV="$(python3 .github/scripts/jacoco_line_coverage.py "$PR_XML")"
          echo "PR line coverage: ${PR_COV}%"

          BASE_REF="${{ github.base_ref }}"
          if [[ -z "$BASE_REF" ]]; then
            echo "github.base_ref is empty; coverage guard only runs on pull_request."
            exit 2
          fi

          # Create an isolated worktree for the base branch and run the same verify there.
          git fetch origin "$BASE_REF":"refs/remotes/origin/$BASE_REF"
          rm -rf .__base_branch || true
          git worktree add .__base_branch "origin/$BASE_REF"

          pushd .__base_branch/veiculos-srv >/dev/null
          chmod +x mvnw
          ./mvnw -B verify
          popd >/dev/null

          BASE_XML=".__base_branch/veiculos-srv/target/site/jacoco/jacoco.xml"
          if [[ ! -f "$BASE_XML" ]]; then
            echo "Base JaCoCo report not found at: $BASE_XML"
            exit 2
          fi

          export BASE_COV
          BASE_COV="$(python3 .github/scripts/jacoco_line_coverage.py "$BASE_XML")"
          echo "Base (${BASE_REF}) line coverage: ${BASE_COV}%"

          python3 - <<'PY'
          import os

          pr = float(os.environ["PR_COV"])
          base = float(os.environ["BASE_COV"])
          # Fail on any decrease; adjust epsilon if you want to ignore tiny fluctuations.
          eps = 0.0

          if pr + eps < base:
            raise SystemExit(
              f"Coverage decreased: PR {pr:.4f}% < base {base:.4f}%"
            )
          print(f"Coverage OK: PR {pr:.4f}% >= base {base:.4f}%")
          PY
